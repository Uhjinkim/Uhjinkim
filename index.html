<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>HTML Tetris</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    height: 100vh;
    background: #111827;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .game {
    position: relative;
    display: flex;
    gap: 24px;
    padding: 24px;
    background: #1f2937;
    border-radius: 16px;
  }
  canvas {
    background: #020617;
    border: 3px solid #374151;
  }
  .panel {
    width: 160px;
  }
  .score {
    font-size: 24px;
    margin-bottom: 16px;
  }
  #next {
    width: 120px;
    height: 120px;
    margin-bottom: 16px;
  }
  button {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #38bdf8;
    color: #020617;
    font-weight: bold;
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 16px;
  }
  .modal {
    background: #111827;
    padding: 28px;
    border-radius: 16px;
    text-align: center;
    min-width: 220px;
  }
</style>
</head>
<body>

<div class="game">
  <canvas id="board" width="300" height="600"></canvas>

  <div class="panel">
    <div class="score">점수: <span id="score">0</span></div>

    <p>다음 블록</p>
    <canvas id="next" width="120" height="120"></canvas>

    <p>조작</p>
    <p>← → 이동</p>
    <p>↓ 빠르게</p>
    <p>↑ 회전</p>
    <p>Space 즉시 낙하</p>
  </div>

  <div class="overlay" id="overlay">
    <div class="modal">
      <h2 id="title">테트리스</h2>
      <p id="result"></p>
      <button id="startBtn">시작</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

const nextCanvas = document.getElementById("next");
const nextCtx = nextCanvas.getContext("2d");

const scoreEl = document.getElementById("score");
const overlay = document.getElementById("overlay");
const titleEl = document.getElementById("title");
const resultEl = document.getElementById("result");
const startBtn = document.getElementById("startBtn");

const COLS = 10;
const ROWS = 20;
const SIZE = 30;

const COLORS = [
  null,
  "#22d3ee",
  "#60a5fa",
  "#fb923c",
  "#facc15",
  "#4ade80",
  "#a78bfa",
  "#f472b6"
];

const SHAPES = [
  [],
  [[1,1,1,1]],
  [[2,0,0],[2,2,2]],
  [[0,0,3],[3,3,3]],
  [[4,4],[4,4]],
  [[0,5,5],[5,5,0]],
  [[0,6,0],[6,6,6]],
  [[7,7,0],[0,7,7]]
];

let board;
let piece;
let nextPiece;
let score;
let running;
let dropCounter;
let lastTime;
let dropInterval;

function createBoard() {
  return Array.from({ length: ROWS }, () => Array(COLS).fill(0));
}

function createPiece() {
  const type = Math.floor(Math.random() * 7) + 1;
  return {
    matrix: SHAPES[type].map(row => [...row]),
    x: Math.floor(COLS / 2) - 1,
    y: 0
  };
}

function drawCell(x, y, value) {
  ctx.fillStyle = COLORS[value];
  ctx.fillRect(x * SIZE, y * SIZE, SIZE, SIZE);
  ctx.strokeStyle = "#111827";
  ctx.strokeRect(x * SIZE, y * SIZE, SIZE, SIZE);
}

function drawNextCell(x, y, value, cell, offsetX, offsetY) {
  nextCtx.fillStyle = COLORS[value];
  nextCtx.fillRect(offsetX + x * cell, offsetY + y * cell, cell, cell);
  nextCtx.strokeStyle = "#111827";
  nextCtx.strokeRect(offsetX + x * cell, offsetY + y * cell, cell, cell);
}

function drawNext() {
  nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);

  if (!nextPiece) return;

  const matrix = nextPiece.matrix;
  const cell = 24;
  const offsetX = (nextCanvas.width - matrix[0].length * cell) / 2;
  const offsetY = (nextCanvas.height - matrix.length * cell) / 2;

  matrix.forEach((row, y) => {
    row.forEach((value, x) => {
      if (value) {
        drawNextCell(x, y, value, cell, offsetX, offsetY);
      }
    });
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  board.forEach((row, y) => {
    row.forEach((value, x) => {
      if (value) drawCell(x, y, value);
    });
  });

  piece.matrix.forEach((row, y) => {
    row.forEach((value, x) => {
      if (value) drawCell(piece.x + x, piece.y + y, value);
    });
  });

  drawNext();
}

function collide() {
  for (let y = 0; y < piece.matrix.length; y++) {
    for (let x = 0; x < piece.matrix[y].length; x++) {
      if (
        piece.matrix[y][x] &&
        board[piece.y + y]?.[piece.x + x] !== 0
      ) {
        return true;
      }
    }
  }
  return false;
}

function merge() {
  piece.matrix.forEach((row, y) => {
    row.forEach((value, x) => {
      if (value) board[piece.y + y][piece.x + x] = value;
    });
  });
}

function clearLines() {
  let lines = 0;

  outer:
  for (let y = ROWS - 1; y >= 0; y--) {
    for (let x = 0; x < COLS; x++) {
      if (!board[y][x]) continue outer;
    }

    board.splice(y, 1);
    board.unshift(Array(COLS).fill(0));
    lines++;
    y++;
  }

  if (lines > 0) {
    const multiplier = [0, 1, 3, 6, 10][lines];
    score += lines * multiplier;
    scoreEl.textContent = score;
  }
}

function rotate(matrix) {
  return matrix[0].map((_, i) => matrix.map(row => row[i]).reverse());
}

function move(dir) {
  piece.x += dir;
  if (collide()) piece.x -= dir;
}

function drop() {
  piece.y++;

  if (collide()) {
    piece.y--;
    merge();
    clearLines();

    piece = nextPiece;
    nextPiece = createPiece();

    if (collide()) {
      endGame();
    }
  }

  dropCounter = 0;
}

function hardDrop() {
  while (!collide()) {
    piece.y++;
  }
  piece.y--;
  drop();
}

function update(time = 0) {
  if (!running) return;

  const delta = time - lastTime;
  lastTime = time;
  dropCounter += delta;

  if (dropCounter > dropInterval) {
    drop();
  }

  draw();
  requestAnimationFrame(update);
}

function startGame() {
  board = createBoard();
  piece = createPiece();
  nextPiece = createPiece();
  score = 0;
  running = true;
  dropCounter = 0;
  lastTime = 0;
  dropInterval = 700;

  scoreEl.textContent = score;
  titleEl.textContent = "테트리스";
  resultEl.textContent = "";
  startBtn.textContent = "시작";
  overlay.style.display = "none";

  update();
}

function endGame() {
  running = false;
  titleEl.textContent = "게임 종료";
  resultEl.textContent = `최종 점수: ${score}점`;
  startBtn.textContent = "다시 시작";
  overlay.style.display = "flex";
}

document.addEventListener("keydown", e => {
  if (!running) return;

  if (e.key === "ArrowLeft") move(-1);
  if (e.key === "ArrowRight") move(1);
  if (e.key === "ArrowDown") drop();

  if (e.key === "ArrowUp") {
    const old = piece.matrix;
    piece.matrix = rotate(piece.matrix);
    if (collide()) piece.matrix = old;
  }

  if (e.code === "Space") hardDrop();

  draw();
});

startBtn.addEventListener("click", startGame);

board = createBoard();
piece = createPiece();
nextPiece = createPiece();
draw();
</script>

</body>
</html>
